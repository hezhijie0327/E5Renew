name: Build & Release hezhijie0327/E5Renew

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 */2 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 - Checkout
        uses: actions/checkout@v2.3.4
      - name: Step 2 - Setup Python Environment
        uses: actions/setup-python@v2
      - name: Step 3 - Build E5Renew
        run: sudo cat E5Renew.py | sudo sed "s/config\_client\_id/${{ secrets.config_client_id }}/g;s/config\_client\_secret/${{ secrets.config_client_secret }}/g" > temp.py && sudo pip install requests && sudo python ./temp.py && sudo rm -rf temp.py
      - name: Step 4 - Release E5Renew
        uses: stefanzweifel/git-auto-commit-action@v4.7.2
        with:
          commit_message: Generated by GitHub Actions
